{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
Login
{% endblock title %}

{% block content %}

<div class="container">

    <div class="auth-box mt-5">

        <h2 class="mb-4">Login</h2>

        <form method="post">
            {% csrf_token %}

            {{ form|crispy }}

            <button type="submit" class="btn btn-info w-100 mt-3">
                Login
            </button>
        </form>

    </div>

</div>

{% endblock content %}
